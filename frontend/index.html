<!DOCTYPE html>
<html lang="es">
  <head>
    <style>
      /* Oculta cualquier elemento de lanzador de Landbot que intente aparecer */
      .LandbotLauncher, 
      .landbot-launcher,
      #landbot-launcher {
        display: none !important;
        visibility: hidden !important;
      }
    </style>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Damas IA - Proyecto Tecmilenio</title>
    <script>
      var myLandbot;
      
      window.initLandbot = function() {
        if (!myLandbot) {
          var s = document.createElement('script');
          s.type = "module";
          s.async = true;
          s.addEventListener('load', function() {
            myLandbot = new Landbot.Popup({
              configUrl: 'https://storage.googleapis.com/landbot.online/v3/H-3347253-HSD0KLEQTZRO927F/index.json',
              // ESTA LÍNEA OCULTA EL BOTÓN POR DEFECTO
              launcher: false 
            });
            
            // Lo abrimos manualmente al cargar
            myLandbot.onLoad(() => myLandbot.open());
          });
          s.src = 'https://cdn.landbot.io/landbot-3/landbot-3.0.0.mjs';
          var x = document.getElementsByTagName('script')[0];
          x.parentNode.insertBefore(s, x);
        } else {
          myLandbot.open();
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
